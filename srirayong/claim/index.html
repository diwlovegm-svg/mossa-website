<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MOSSA Coupon">
    <title>รับคูปองทดลองฟรี 1 วัน | MOSSA</title>
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body>
    <main class="page-shell claim-shell">
      <header class="app-topbar">
        <a class="app-home" href="../index.html">MOSSA Coupon</a>
        <div class="app-actions">
          <span id="runtimeStatus" class="runtime-chip"></span>
          <button id="installApp" class="install-button" type="button" hidden>ติดตั้งแอพ</button>
          <a class="text-link" href="../admin/index.html">Admin</a>
        </div>
      </header>

      <section class="hero-panel">
        <div class="brand-mark" aria-label="MOSSA">MOSSA</div>
        <p class="eyebrow">MOSSA Sport Society</p>
        <h1>รับคูปองทดลองฟรี 1 วัน</h1>
        <p class="hero-copy">กรอกข้อมูลเพื่อรับคูปอง แล้วแสดงคูปองนี้กับพนักงานก่อนใช้สิทธิ์</p>
      </section>

      <section class="form-panel" aria-labelledby="claim-title">
        <h2 id="claim-title">ข้อมูลผู้รับคูปอง</h2>
        <form id="claimForm" class="stacked-form">
          <label>
            <span>ชื่อ</span>
            <input id="customerName" name="customerName" autocomplete="name" required placeholder="ชื่อ-นามสกุล">
          </label>
          <label>
            <span>เบอร์โทร</span>
            <input id="customerPhone" name="customerPhone" inputmode="tel" autocomplete="tel" required placeholder="08x-xxx-xxxx">
          </label>
          <button id="claimButton" class="primary-button" type="submit">รับคูปอง</button>
        </form>
        <div id="claimNotice" class="notice" role="status" aria-live="polite"></div>
      </section>

      <section id="couponSection" class="coupon-output" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">คูปองของคุณ</p>
            <h2>บันทึกภาพนี้ไว้ใช้หน้าบูธ</h2>
          </div>
          <button id="downloadCoupon" class="secondary-button" type="button">บันทึกรูปคูปอง</button>
        </div>
        <div id="couponPreview"></div>
      </section>
    </main>

    <script type="module" src="./claim.js"></script>
  </body>
</html>
